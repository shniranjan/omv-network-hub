User nobody
Group nogroup
Port 8888
Listen 0.0.0.0
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatHost "tinyproxy.stats"
StatFile "/usr/share/tinyproxy/stats.html"
LogLevel Info
MaxClients 100
MinSpareServers 5
MaxSpareServers 20
StartServers 10
MaxRequestsPerChild 0

# Allow LAN only
Allow 192.168.0.0/16
Allow 10.0.0.0/8
Allow 172.16.0.0/12

# Disable proxy header forwarding
DisableViaHeader Yes

# CONNECT method — allow HTTPS
ConnectPort 443
ConnectPort 563
